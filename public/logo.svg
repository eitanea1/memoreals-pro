<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Rough hand-drawn circle border -->
  <path
    d="M 50 6 C 64 5, 78 10, 87 20 C 96 30, 97 44, 94 57 C 91 70, 83 82, 71 88 C 59 94, 44 94, 32 88 C 20 82, 11 70, 8 57 C 5 44, 7 29, 15 19 C 23 9, 37 6, 50 6"
    stroke="#1c1917"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- Heart shape (solid fill) -->
  <path
    d="M 50 74
       C 38 64, 18 54, 18 38
       C 18 27, 27 21, 36 23
       C 42 25, 47 30, 50 36
       C 53 30, 58 25, 64 23
       C 73 21, 82 27, 82 38
       C 82 54, 62 64, 50 74 Z"
    fill="#1c1917"
  />

  <!-- Left eye / head (white cutout) -->
  <circle cx="36" cy="35" r="8.5" fill="white"/>
  <!-- Left pupil -->
  <circle cx="36" cy="37" r="4" fill="#1c1917"/>

  <!-- Right eye / head (white cutout) -->
  <circle cx="64" cy="35" r="8.5" fill="white"/>
  <!-- Right pupil -->
  <circle cx="64" cy="37" r="4" fill="#1c1917"/>

  <!-- Smile -->
  <path
    d="M 40 56 Q 50 64, 60 56"
    stroke="white"
    stroke-width="2.2"
    stroke-linecap="round"
  />

  <!-- Drip / teardrop at bottom of heart -->
  <ellipse cx="50" cy="73" rx="3.5" ry="5" fill="white"/>

  <!-- Arm extending left and up from heart -->
  <path
    d="M 21 46 Q 11 36, 17 24"
    stroke="#1c1917"
    stroke-width="4.5"
    stroke-linecap="round"
  />
</svg>
